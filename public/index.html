<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - منصة QR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 400px;">
    <h2 class="text-center mb-4">🔐 تسجيل الدخول</h2>
    <form id="loginForm">
      <input type="text" id="username" class="form-control mb-2" placeholder="اسم المستخدم" required>
      <input type="password" id="password" class="form-control mb-2" placeholder="كلمة المرور" required>
      <button type="submit" class="btn btn-primary w-100">دخول</button>
      <div id="errorMsg" class="text-danger mt-2 text-center"></div>
    </form>
  </div>
</div>
<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('role', data.role);
      window.location.href = data.role === 'admin' ? '/admin.html' : '/dashboard.html';
    } else {
      document.getElementById('errorMsg').innerText = data.error;
    }
  });
</script>
</body>
</html>
