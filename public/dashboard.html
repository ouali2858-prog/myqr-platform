<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة المستخدم - QR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">⭐ منصة QR الديناميكية</span>
  <button id="logoutBtn" class="btn btn-outline-light">تسجيل خروج</button>
</nav>
<div class="container mt-4">
  <div class="row">
    <div class="col-md-6">
      <div class="card mb-4">
        <div class="card-header bg-primary text-white">إنشاء كود ديناميكي</div>
        <div class="card-body">
          <label>الرابط الوجهة (يمكن تغييره لاحقاً)</label>
          <input type="url" id="destUrl" class="form-control mb-2" placeholder="https://example.com">
          <button id="createBtn" class="btn btn-success w-100">إنشاء كود QR</button>
          <div id="qrResult" class="text-center mt-3"></div>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-secondary text-white">أكوادي الديناميكية</div>
        <div class="card-body">
          <div id="dynamicList"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  async function fetchList() {
    const res = await fetch('/api/dynamic/list');
    if (!res.ok) return;
    const list = await res.json();
    const container = document.getElementById('dynamicList');
    container.innerHTML = '<ul class="list-group">';
    for (let item of list) {
      container.innerHTML += `
        <li class="list-group-item">
          <strong>${item.short_code}</strong> → 
          <input type="url" id="edit-${item.id}" value="${item.destination}" class="form-control d-inline w-50">
          <button class="btn btn-sm btn-warning" onclick="updateDestination(${item.id})">تعديل</button>
          <br><small>رابط المسح: ${window.location.origin}/go/${item.short_code}</small>
        </li>`;
    }
    container.innerHTML += '</ul>';
  }
  async function updateDestination(id) {
    const newUrl = document.getElementById(`edit-${id}`).value;
    const res = await fetch(`/api/dynamic/update/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ destination: newUrl })
    });
    if (res.ok) fetchList();
    else alert('فشل التحديث');
  }
  document.getElementById('createBtn').onclick = async () => {
    const destination = document.getElementById('destUrl').value;
    if (!destination) return alert('أدخل رابطاً');
    const res = await fetch('/api/dynamic/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ destination })
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('qrResult').innerHTML = `<img src="${data.qrImage}" width="200"><br><small>الكود القصير: ${data.short_code}</small>`;
      fetchList();
    } else alert(data.error);
  };
  document.getElementById('logoutBtn').onclick = async () => {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/';
  };
  fetchList();
</script>
</body>
</html>
